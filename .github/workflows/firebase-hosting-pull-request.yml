name: Build on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_next_app:
    name: Build Next.js App
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: "npm"
      - run: npm install npm@11.12.1 -g
      - run: npm ci
      - run: npm run build

  build_cloud_functions:
    name: Build Cloud Functions
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: "npm"
      - run: npm install npm@11.12.1 -g
      - run: npm ci
      - run: cd functions && npm run build
      
  build_apps_script:
    name: Build Apps Script
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: "npm"
      - run: npm install npm@11.12.1 -g
      - run: npm ci
      - run: cd apps-script && npm run build